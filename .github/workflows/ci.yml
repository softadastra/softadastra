name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read

jobs:
  build-test-install:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            git \
            ca-certificates \
            libasio-dev

      - name: Clean build, install, deps and smoke directories
        shell: bash
        run: |
          rm -rf build install deps smoke-umbrella smoke-module

      - name: Fetch vix async dependency
        shell: bash
        run: |
          git clone --depth 1 --branch dev --recurse-submodules https://github.com/vixcpp/async.git deps/async
          git -C deps/async submodule update --init --recursive --depth 1 || true

      - name: Prepare Asio for async
        shell: bash
        run: |
          mkdir -p deps/async/third_party/asio/include

          if [ "${{ runner.os }}" = "Linux" ]; then
            cp -r /usr/include/asio* deps/async/third_party/asio/include/ || true
          fi

          if [ "${{ runner.os }}" = "macOS" ]; then
            curl -L https://github.com/chriskohlhoff/asio/archive/refs/tags/asio-1-30-2.tar.gz -o asio.tar.gz
            tar -xzf asio.tar.gz
            cp -r asio-asio-1-30-2/asio/include/* deps/async/third_party/asio/include/
          fi

          test -f deps/async/third_party/asio/include/asio.hpp

      - name: Build and install vix async dependency
        shell: bash
        run: |
          cmake -S deps/async -B deps/async/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/deps/install" \
            -DVIX_ASYNC_BUILD_TESTS=OFF \
            -DVIX_ASYNC_BUILD_EXAMPLES=OFF \
            -DVIX_ENABLE_SANITIZERS=OFF

          cmake --build deps/async/build -j2
          cmake --install deps/async/build

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/deps/install" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" \
            -DSOFTADASTRA_BUILD_EXAMPLES=OFF \
            -DSOFTADASTRA_BUILD_TESTS=ON \
            -DSOFTADASTRA_BUILD_CLI=ON \
            -DSOFTADASTRA_BUILD_APPS=ON \
            -DSOFTADASTRA_BUILD_CLI_APP=ON \
            -DSOFTADASTRA_BUILD_NODE_APP=OFF \
            -DSOFTADASTRA_INSTALL=ON \
            -DSOFTADASTRA_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Install
        shell: bash
        run: |
          cmake --install build

      - name: Smoke test - CLI binary
        shell: bash
        run: |
          CLI="${{ github.workspace }}/install/bin/softadastra"

          "$CLI" version
          "$CLI" help
          "$CLI" status
          "$CLI" store put name gaspard
          "$CLI" store get name
          "$CLI" sync status

      - name: Smoke test - umbrella package
        shell: bash
        run: |
          rm -rf smoke-umbrella
          mkdir -p smoke-umbrella

          cat > smoke-umbrella/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(softadastra_smoke_umbrella LANGUAGES CXX)

          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)

          find_package(softadastra CONFIG REQUIRED)

          add_executable(softadastra_smoke_umbrella main.cpp)
          target_link_libraries(softadastra_smoke_umbrella PRIVATE
            softadastra::core
            softadastra::store
            softadastra::sync
            softadastra::transport
            softadastra::discovery
            softadastra::metadata
            softadastra::cli
          )
          EOF

          cat > smoke-umbrella/main.cpp <<'EOF'
          #include <softadastra/core/time/Timestamp.hpp>
          #include <softadastra/store/core/StoreConfig.hpp>
          #include <softadastra/sync/core/SyncConfig.hpp>
          #include <softadastra/cli/cli.hpp>

          int main()
          {
            auto now = softadastra::core::time::Timestamp::now();
            return now.is_valid() ? 0 : 1;
          }
          EOF

          cmake -S smoke-umbrella -B smoke-umbrella/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install;${{ github.workspace }}/deps/install"

          cmake --build smoke-umbrella/build --config ${{ matrix.build_type }}

      - name: Smoke test - direct module package
        shell: bash
        run: |
          rm -rf smoke-module
          mkdir -p smoke-module

          cat > smoke-module/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(softadastra_smoke_module LANGUAGES CXX)

          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)

          find_package(softadastra_metadata CONFIG REQUIRED)

          add_executable(softadastra_smoke_module main.cpp)
          target_link_libraries(softadastra_smoke_module PRIVATE
            softadastra::metadata
          )
          EOF

          cat > smoke-module/main.cpp <<'EOF'
          #include <softadastra/core/time/Timestamp.hpp>
          #include <softadastra/metadata/core/NodeIdentity.hpp>

          int main()
          {
            softadastra::metadata::core::NodeIdentity identity;
            identity.node_id = "node-1";

            if (!identity.is_valid())
            {
              return 1;
            }

            return softadastra::core::time::Timestamp::now().is_valid() ? 0 : 1;
          }
          EOF

          cmake -S smoke-module -B smoke-module/build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install;${{ github.workspace }}/deps/install"

          cmake --build smoke-module/build --config ${{ matrix.build_type }}

      - name: Upload CMake logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.os }}-${{ matrix.build_type }}
          path: |
            build/CMakeCache.txt
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/Testing/Temporary/LastTest.log
            smoke-umbrella/build/CMakeCache.txt
            smoke-umbrella/build/CMakeFiles/CMakeOutput.log
            smoke-umbrella/build/CMakeFiles/CMakeError.log
            smoke-module/build/CMakeCache.txt
            smoke-module/build/CMakeFiles/CMakeOutput.log
            smoke-module/build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
