name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to build/release (e.g. v0.2.0). If empty, uses the current ref."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: build (${{ matrix.softadastraos }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            softadastraos: linux
            arch: x86_64
            archive: tar.gz

          - os: macos-14
            softadastraos: macos
            arch: aarch64
            archive: tar.gz

          - os: windows-2022
            softadastraos: windows
            arch: x86_64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        shell: bash
        run: |
          set -euxo pipefail
          git fetch --tags --force
          git checkout "tags/${{ github.event.inputs.tag }}"

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            git \
            ca-certificates \
            libasio-dev

      - name: Clean build directories
        shell: bash
        run: |
          rm -rf build install deps dist dist-all asio.tar.gz asio-asio-1-30-2

      - name: Fetch vix async dependency
        shell: bash
        run: |
          git clone --depth 1 --branch dev --recurse-submodules https://github.com/vixcpp/async.git deps/async
          git -C deps/async submodule update --init --recursive --depth 1 || true

      - name: Prepare Asio for async
        shell: bash
        run: |
          set -euo pipefail

          ASIO_VERSION="asio-1-30-2"
          ASIO_ARCHIVE="/tmp/asio.tar.gz"
          ASIO_SRC="/tmp/asio-${ASIO_VERSION}"

          rm -rf "${ASIO_ARCHIVE}" "${ASIO_SRC}"
          mkdir -p deps/async/third_party/asio/include

          if [ "${{ runner.os }}" = "Linux" ]; then
            cp -r /usr/include/asio* deps/async/third_party/asio/include/ || true
          fi

          if [ ! -f deps/async/third_party/asio/include/asio.hpp ]; then
            curl -L --fail --retry 3 --retry-delay 2 \
              -H "Accept: application/octet-stream" \
              -o "${ASIO_ARCHIVE}" \
              "https://codeload.github.com/chriskohlhoff/asio/tar.gz/refs/tags/${ASIO_VERSION}"

            file "${ASIO_ARCHIVE}"
            gzip -t "${ASIO_ARCHIVE}"

            tar -xzf "${ASIO_ARCHIVE}" -C /tmp

            test -d "${ASIO_SRC}/asio/include/asio"
            test -f "${ASIO_SRC}/asio/include/asio.hpp"

            cp -R "${ASIO_SRC}/asio/include/asio" \
              deps/async/third_party/asio/include/

            cp "${ASIO_SRC}/asio/include/asio.hpp" \
              deps/async/third_party/asio/include/
          fi

          test -f deps/async/third_party/asio/include/asio.hpp

      - name: Build and install vix async dependency
        shell: bash
        run: |
          cmake -S deps/async -B deps/async/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/deps/install" \
            -DVIX_ASYNC_BUILD_TESTS=OFF \
            -DVIX_ASYNC_BUILD_EXAMPLES=OFF \
            -DVIX_ENABLE_SANITIZERS=OFF

          cmake --build deps/async/build --config Release -j2
          cmake --install deps/async/build --config Release

      - name: Configure
        shell: bash
        run: |
          set -euxo pipefail

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/deps/install" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" \
            -DSOFTADASTRA_BUILD_EXAMPLES=OFF \
            -DSOFTADASTRA_BUILD_TESTS=OFF \
            -DSOFTADASTRA_BUILD_CLI=ON \
            -DSOFTADASTRA_BUILD_APPS=ON \
            -DSOFTADASTRA_BUILD_CLI_APP=ON \
            -DSOFTADASTRA_BUILD_NODE_APP=OFF \
            -DSOFTADASTRA_INSTALL=ON \
            -DSOFTADASTRA_WARNINGS_AS_ERRORS=ON

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build build --config Release -j2

      - name: Install
        shell: bash
        run: |
          set -euxo pipefail
          cmake --install build --config Release

      - name: Validate installed CLI Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail

          test -f install/bin/softadastra
          install/bin/softadastra version
          install/bin/softadastra help
          install/bin/softadastra status
          install/bin/softadastra store put name gaspard
          install/bin/softadastra store get name
          install/bin/softadastra sync status

      - name: Validate installed CLI Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "install\bin\softadastra.exe")) {
            Write-Host "softadastra.exe not found"
            Get-ChildItem -Recurse install | Select-Object FullName
            exit 1
          }

          .\install\bin\softadastra.exe version
          .\install\bin\softadastra.exe help
          .\install\bin\softadastra.exe status
          .\install\bin\softadastra.exe store put name gaspard
          .\install\bin\softadastra.exe store get name
          .\install\bin\softadastra.exe sync status

      - name: Package binary Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p dist/pkg/bin
          cp install/bin/softadastra dist/pkg/bin/softadastra
          chmod +x dist/pkg/bin/softadastra

          cat > dist/pkg/README.txt <<'EOF'
          Softadastra CLI

          Add bin/ to your PATH or copy bin/softadastra to a directory already in PATH.

          Example:
            softadastra version
            softadastra status
          EOF

          ASSET="softadastra-${{ matrix.softadastraos }}-${{ matrix.arch }}.tar.gz"
          tar -C dist/pkg -czf "dist/$ASSET" .

      - name: Package binary Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\pkg\bin | Out-Null
          Copy-Item install\bin\softadastra.exe dist\pkg\bin\softadastra.exe

          @"
          Softadastra CLI

          Add bin\ to your PATH or copy bin\softadastra.exe to a directory already in PATH.

          Example:
            softadastra version
            softadastra status
          "@ | Out-File -FilePath dist\pkg\README.txt -Encoding utf8

          $asset = "softadastra-${{ matrix.softadastraos }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path dist\pkg\* -DestinationPath "dist\$asset" -Force

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.softadastraos }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.softadastraos }}-${{ matrix.arch }}
          path: |
            build/CMakeCache.txt
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

  publish:
    name: publish
    needs: build-release
    runs-on: ubuntu-24.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten dist
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p dist

          find dist-all -type f \( -name "softadastra-*.tar.gz" -o -name "softadastra-*.zip" \) -print0 |
            while IFS= read -r -d '' f; do
              base="$(basename "$f")"
              if [ -f "dist/$base" ]; then
                echo "Asset collision: $base" >&2
                exit 1
              fi
              cp -f "$f" "dist/$base"
            done

          ls -la dist
          test "$(ls -A dist | wc -l)" -gt 0

      - name: Generate sha256 files
        shell: bash
        run: |
          set -euxo pipefail

          cd dist

          for f in softadastra-*; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done

          ls -la

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          set -euxo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: dist/*
