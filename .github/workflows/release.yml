name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to build/release, for example v0.3.0. If empty, uses the current ref."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: build (${{ matrix.softadastraos }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            softadastraos: linux
            arch: x86_64
            cli_asset: softadastra-linux-x86_64.tar.gz

          - os: macos-14
            softadastraos: macos
            arch: aarch64
            cli_asset: softadastra-macos-aarch64.tar.gz

          - os: windows-2022
            softadastraos: windows
            arch: x86_64
            cli_asset: softadastra-windows-x86_64.zip

    env:
      BUILD_DIR: build
      INSTALL_DIR: install
      ASYNC_INSTALL_DIR: deps/install

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        shell: bash
        run: |
          set -euxo pipefail

          git fetch --tags --force
          git checkout "tags/${{ github.event.inputs.tag }}"

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            git \
            curl \
            ca-certificates \
            libasio-dev \
            tar \
            zip \
            unzip

      - name: Clean build directories
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf \
            "$BUILD_DIR" \
            "$INSTALL_DIR" \
            "$ASYNC_INSTALL_DIR" \
            deps/async \
            dist \
            dist-all \
            smoke-cli \
            /tmp/asio.tar.gz \
            /tmp/asio-asio-1-30-2

      - name: Fetch vix async dependency
        shell: bash
        run: |
          set -euxo pipefail

          git clone --depth 1 --branch dev --recurse-submodules https://github.com/vixcpp/async.git deps/async
          git -C deps/async submodule update --init --recursive --depth 1 || true

      - name: Prepare Asio for async
        shell: bash
        run: |
          set -euo pipefail

          ASIO_VERSION="asio-1-30-2"
          ASIO_ARCHIVE="/tmp/asio.tar.gz"
          ASIO_SRC="/tmp/asio-${ASIO_VERSION}"

          rm -rf "${ASIO_ARCHIVE}" "${ASIO_SRC}"
          mkdir -p deps/async/third_party/asio/include

          if [ "${{ runner.os }}" = "Linux" ]; then
            cp -r /usr/include/asio* deps/async/third_party/asio/include/ || true
          fi

          if [ ! -f deps/async/third_party/asio/include/asio.hpp ]; then
            curl -L --fail --retry 3 --retry-delay 2 \
              -H "Accept: application/octet-stream" \
              -o "${ASIO_ARCHIVE}" \
              "https://codeload.github.com/chriskohlhoff/asio/tar.gz/refs/tags/${ASIO_VERSION}"

            file "${ASIO_ARCHIVE}"
            gzip -t "${ASIO_ARCHIVE}"

            tar -xzf "${ASIO_ARCHIVE}" -C /tmp

            test -d "${ASIO_SRC}/asio/include/asio"
            test -f "${ASIO_SRC}/asio/include/asio.hpp"

            cp -R "${ASIO_SRC}/asio/include/asio" \
              deps/async/third_party/asio/include/

            cp "${ASIO_SRC}/asio/include/asio.hpp" \
              deps/async/third_party/asio/include/
          fi

          test -f deps/async/third_party/asio/include/asio.hpp

      - name: Build and install vix async dependency
        shell: bash
        run: |
          set -euxo pipefail

          cmake -S deps/async -B deps/async/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/${ASYNC_INSTALL_DIR}" \
            -DVIX_ASYNC_BUILD_TESTS=OFF \
            -DVIX_ASYNC_BUILD_EXAMPLES=OFF \
            -DVIX_ENABLE_SANITIZERS=OFF

          cmake --build deps/async/build --config Release -j2
          cmake --install deps/async/build --config Release

      - name: Determine build version
        id: build_version
        shell: bash
        run: |
          set -euxo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          VERSION="${VERSION#v}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Configure Softadastra CLI
        shell: bash
        run: |
          set -euxo pipefail

          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSOFTADASTRA_VERSION="${{ steps.build_version.outputs.version }}" \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/${ASYNC_INSTALL_DIR}" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/${INSTALL_DIR}" \
            -DSOFTADASTRA_BUILD_EXAMPLES=OFF \
            -DSOFTADASTRA_BUILD_TESTS=OFF \
            -DSOFTADASTRA_BUILD_CLI=ON \
            -DSOFTADASTRA_BUILD_APPS=ON \
            -DSOFTADASTRA_BUILD_CLI_APP=ON \
            -DSOFTADASTRA_BUILD_NODE_APP=OFF \
            -DSOFTADASTRA_INSTALL=ON \
            -DSOFTADASTRA_WARNINGS_AS_ERRORS=ON

      - name: Build Softadastra CLI
        shell: bash
        run: |
          set -euxo pipefail

          cmake --build "$BUILD_DIR" --config Release -j2

      - name: Install Softadastra CLI
        shell: bash
        run: |
          set -euxo pipefail

          cmake --install "$BUILD_DIR" --config Release

      - name: Validate installed CLI Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail

          test -f "$INSTALL_DIR/bin/softadastra"

          "$INSTALL_DIR/bin/softadastra" version
          "$INSTALL_DIR/bin/softadastra" help
          "$INSTALL_DIR/bin/softadastra" status
          "$INSTALL_DIR/bin/softadastra" store put name gaspard
          "$INSTALL_DIR/bin/softadastra" store get name
          "$INSTALL_DIR/bin/softadastra" sync status

      - name: Validate installed CLI Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "$env:INSTALL_DIR\bin\softadastra.exe")) {
            Write-Host "softadastra.exe not found"
            Get-ChildItem -Recurse "$env:INSTALL_DIR" | Select-Object FullName
            exit 1
          }

          & "$env:INSTALL_DIR\bin\softadastra.exe" version
          & "$env:INSTALL_DIR\bin\softadastra.exe" help
          & "$env:INSTALL_DIR\bin\softadastra.exe" status
          & "$env:INSTALL_DIR\bin\softadastra.exe" store put name gaspard
          & "$env:INSTALL_DIR\bin\softadastra.exe" store get name
          & "$env:INSTALL_DIR\bin\softadastra.exe" sync status

      - name: Package CLI Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf dist/cli-pkg
          mkdir -p dist/cli-pkg/bin

          cp "$INSTALL_DIR/bin/softadastra" dist/cli-pkg/bin/softadastra
          chmod +x dist/cli-pkg/bin/softadastra

          cat > dist/cli-pkg/README.txt <<'EOF'
          Softadastra CLI

          Add bin/ to your PATH or copy bin/softadastra to a directory already in PATH.

          Example:
            softadastra version
            softadastra status
          EOF

          tar -C dist/cli-pkg -czf "dist/${{ matrix.cli_asset }}" .

      - name: Package CLI Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist\cli-pkg -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Force -Path dist\cli-pkg\bin | Out-Null
          Copy-Item "$env:INSTALL_DIR\bin\softadastra.exe" dist\cli-pkg\bin\softadastra.exe

          @"
          Softadastra CLI

          Add bin\ to your PATH or copy bin\softadastra.exe to a directory already in PATH.

          Example:
            softadastra version
            softadastra status
          "@ | Out-File -FilePath dist\cli-pkg\README.txt -Encoding utf8

          Compress-Archive -Path dist\cli-pkg\* -DestinationPath "dist\${{ matrix.cli_asset }}" -Force

      - name: Validate packaged CLI Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail

          rm -rf smoke-cli
          mkdir -p smoke-cli

          tar -xzf "dist/${{ matrix.cli_asset }}" -C smoke-cli

          test -f smoke-cli/bin/softadastra
          smoke-cli/bin/softadastra version

      - name: Validate packaged CLI Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force smoke-cli -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path smoke-cli | Out-Null

          Expand-Archive -Path "dist\${{ matrix.cli_asset }}" -DestinationPath smoke-cli -Force

          if (!(Test-Path "smoke-cli\bin\softadastra.exe")) {
            Write-Host "softadastra.exe not found in CLI archive"
            Get-ChildItem -Recurse smoke-cli | Select-Object FullName
            exit 1
          }

          .\smoke-cli\bin\softadastra.exe version

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.softadastraos }}-${{ matrix.arch }}
          path: |
            dist/${{ matrix.cli_asset }}
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.softadastraos }}-${{ matrix.arch }}
          path: |
            ${{ env.BUILD_DIR }}/CMakeCache.txt
            ${{ env.BUILD_DIR }}/CMakeFiles/CMakeOutput.log
            ${{ env.BUILD_DIR }}/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

  publish:
    name: publish GitHub Release
    needs: build-release
    runs-on: ubuntu-24.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten dist
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p dist

          find dist-all -type f \( \
            -name "softadastra-*.tar.gz" -o \
            -name "softadastra-*.zip" \
          \) -print0 |
            while IFS= read -r -d '' f; do
              base="$(basename "$f")"

              if [ -f "dist/$base" ]; then
                echo "Asset collision: $base" >&2
                exit 1
              fi

              cp -f "$f" "dist/$base"
            done

          ls -lah dist
          test "$(ls -A dist | wc -l)" -gt 0

      - name: Generate sha256 files
        shell: bash
        run: |
          set -euxo pipefail

          cd dist

          for f in softadastra-*; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done

          ls -lah

      - name: Sign release assets
        shell: bash
        env:
          MINISIGN_PRIVATE_KEY_B64: ${{ secrets.MINISIGN_PRIVATE_KEY_B64 }}
        run: |
          set -euxo pipefail

          cd dist

          if [ -z "${MINISIGN_PRIVATE_KEY_B64:-}" ]; then
            echo "MINISIGN_PRIVATE_KEY_B64 is missing" >&2
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends minisign

          keyfile="$(mktemp)"
          chmod 600 "$keyfile"

          printf "%s" "$MINISIGN_PRIVATE_KEY_B64" | base64 -d > "$keyfile"
          test -s "$keyfile"

          for f in softadastra-*.tar.gz softadastra-*.zip; do
            [ -f "$f" ] || continue
            minisign -S -W -s "$keyfile" -m "$f"
          done

          rm -f "$keyfile"

          ls -lah

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          set -euxo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: dist/*
